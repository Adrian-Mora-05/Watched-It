services:
  api:
    build:
      context: .                  
      dockerfile: api/Dockerfile   
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app/api
      - ./shared:/app/shared
      - /app/api/node_modules
    env_file:
      - ./api/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300